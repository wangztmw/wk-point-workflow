<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通用 HTML → PPTX 转换器</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:#1a1a2e;color:#eee;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:20px;
  }
  h1{font-size:20px;margin-bottom:4px}.sub{font-size:12px;color:#8899cc;margin-bottom:16px}

  /* ---- Control Panel ---- */
  .ctl{
    background:#16213e;border-radius:12px;padding:16px 20px;width:100%;max-width:900px;margin-bottom:12px;
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  }
  .ctl input[type=text]{
    flex:1;min-width:200px;padding:9px 12px;border-radius:8px;
    border:1px solid #1a508b;background:#0f3460;color:#e0e0ff;font-size:13px;
  }
  .ctl input[type=file]{display:none}
  .btn{
    padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;
    cursor:pointer;transition:transform .15s,box-shadow .15s;white-space:nowrap;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .btn-red{background:#e94560;color:#fff}
  .btn-blue{background:#0f3460;color:#e0e0ff;border:1px solid #1a508b}
  .btn-green{background:#2ecc71;color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

  /* ---- Render Area (hidden, used for DOM measurement) ---- */
  .render-wrap{
    display:none;position:absolute;left:-9999px;top:0;
    width:960px;
  }
  .render-wrap.active{display:block;position:static;margin-bottom:16px;}

  /* ---- Log ---- */
  .log{
    width:100%;max-width:900px;background:#0f3460;border-radius:8px;
    padding:10px 16px;font-size:12px;color:#8899cc;max-height:180px;overflow-y:auto;
    white-space:pre-wrap;font-family:monospace;flex-shrink:0;
  }
</style>
</head>
<body>

<h1>📊 通用 HTML → PPTX 转换器</h1>
<p class="sub">加载 HTML 幻灯片 → 自动平铺渲染 → dom-to-pptx 导出（保留图形/CSS/SVG）</p>

<div class="ctl">
  <input type="text" id="file-path" value="dis.html" placeholder="HTML 文件路径">
  <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">📁 浏览</button>
  <input type="file" id="file-input" accept=".html,.htm" onchange="onFileSelect(event)">
  <button class="btn btn-red" id="btn-load" onclick="loadAndRender()">🔍 加载并渲染</button>
  <span style="font-size:12px;color:#8899aa;">slide 选择器:</span>
  <input type="text" id="slide-sel" value=".slide" style="width:80px;padding:6px 8px;border-radius:6px;border:1px solid #1a508b;background:#0f3460;color:#e0e0ff;font-size:12px;">
  <span style="font-size:12px;color:#8899aa;" id="count-label">-</span>
  <span style="flex:1"></span>
  <button class="btn btn-green" id="btn-export-dom" onclick="exportViaDomToPptx()" disabled>⬇ dom-to-pptx 导出</button>
  <button class="btn btn-blue" id="btn-export-pptx" onclick="exportViaPptxGenJS()" disabled>⬇ 文本提取导出</button>
</div>

<div class="render-wrap" id="render-wrap"></div>
<div class="log" id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/dom-to-pptx@1.1.5/dist/dom-to-pptx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script>
// ============================================================
let slideEls = [];

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}
function clearLog() {
  const el = document.getElementById('log');
  el.textContent = '';
}

// ============================================================
// File selection
// ============================================================
function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-path').value = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) { processHTML(ev.target.result); };
  reader.readAsText(file);
  e.target.value = '';
}

async function loadAndRender() {
  const path = document.getElementById('file-path').value.trim();
  if (!path) { log('❌ 请输入文件路径'); return; }
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    processHTML(html);
  } catch (err) {
    log('❌ 加载失败: ' + err.message + ' — 请用"📁 浏览"选择文件');
  }
}

// ============================================================
// Core: render HTML in flat layout, extract slides
// ============================================================
function processHTML(rawHTML) {
  clearLog();
  log('⏳ 处理 HTML...');

  // 1. Clean HTML: remove scripts, remove problematic CSS
  let html = rawHTML
    // Remove all <script> tags (they'd execute and interfere)
    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
    // Remove nav/header elements (fixed position, not slide content)
    // We keep them but CSS will override their positioning
    // Remove scroll-snap
    .replace(/scroll-snap-type\s*:[^;]+;?/gi, '')
    .replace(/scroll-snap-align\s*:[^;]+;?/gi, '')
    // Remove fixed/sticky positioning that would break flat layout
    .replace(/position\s*:\s*fixed\s*!?\s*;?/gi, 'position:absolute;');

  // 2. Build the render document: override slide sizing + reveal all content
  const overrideCSS = `
    <style>
      /* Override slide dimensions for flat rendering */
      .slide, [class*=slide], section[class*=slide] {
        width: 960px !important;
        min-height: 540px !important;
        height: auto !important;
        padding: 40px 60px !important;
        margin: 0 0 16px 0 !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        border-bottom: 1px dashed #ddd !important;
        position: relative !important;
        scroll-snap-align: none !important;
      }
      html { scroll-snap-type: none !important; overflow: visible !important; }
      body { overflow: visible !important; }
      .nav, nav, [class*=nav]:not([class*=slide]) { display: none !important; }
      .slide-inner { display: block !important; }

      /* ★ 关键修复：强制所有 reveal 动画元素立即可见 ★ */
      .rv, .rv-stagger, [class*=rv] {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
        animation: none !important;
      }
      .rv-stagger > *, [class*=rv-stagger] > * {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
        animation: none !important;
      }
      /* 也修复 fadeUp 等入场动画 */
      [style*="animation"] {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    </style>`;

  // 3. Put it all together
  const fullHTML = html.replace('</head>', overrideCSS + '</head>');

  // 4. Render in the render-wrap div (not iframe, so dom-to-pptx can access)
  const wrap = document.getElementById('render-wrap');
  wrap.innerHTML = fullHTML;
  wrap.classList.add('active');

  // 5. Wait a tick for layout, then find slides
  setTimeout(function() {
    const sel = document.getElementById('slide-sel').value.trim() || '.slide';
    slideEls = Array.from(wrap.querySelectorAll(sel));

    const count = slideEls.length;
    document.getElementById('count-label').textContent = count + ' 页';
    document.getElementById('btn-export-dom').disabled = count === 0;
    document.getElementById('btn-export-pptx').disabled = count === 0;

    if (count === 0) {
      log('⚠️ 选择器 "' + sel + '" 未匹配到元素');
      // Suggest alternatives
      for (const s of ['.slide', 'section', 'div[class*=slide]', '.page', 'article']) {
        const n = wrap.querySelectorAll(s).length;
        if (n > 0) log('  💡 "' + s + '" → ' + n + ' 个');
      }
    } else {
      log('✅ 检测到 ' + count + ' 个幻灯片（平铺渲染，dom-to-pptx 可直接测量）');
      slideEls.slice(0, 3).forEach(function(el, i) {
        const txt = (el.textContent || '').replace(/\s+/g, ' ').trim().substring(0, 80);
        log('  [' + (i+1) + '] ' + txt + '...');
      });
      if (count > 3) log('  ... 还有 ' + (count - 3) + ' 个');
    }
  }, 300);
}

// ============================================================
// Export Mode 1: dom-to-pptx (preserves CSS graphics, SVG, gradients)
// ============================================================
async function exportViaDomToPptx() {
  if (slideEls.length === 0) { log('❌ 请先加载并渲染 HTML'); return; }

  try {
    clearLog();
    log('⏳ dom-to-pptx 导出中（保留 CSS 图形/SVG/渐变/边框）...');
    log('  共 ' + slideEls.length + ' 个幻灯片元素');

    await domToPptx.exportToPptx(slideEls, {
      fileName: 'converted-dom.pptx',
      svgAsVector: true,
      autoEmbedFonts: true,
      layout: 'LAYOUT_16x9',
    });

    log('✅ 导出成功！converted-dom.pptx');
    log('  - 文本 → 可编辑文本框');
    log('  - SVG → 矢量形状（PPT 中右键"转换为形状"）');
    log('  - CSS 渐变/圆角/阴影 → PPT 原生形状属性');
    log('  - 卡片/边框/背景 → PPT 原生形状');
  } catch (err) {
    log('❌ dom-to-pptx 导出失败: ' + err.message);
    log('💡 可尝试"文本提取导出"作为降级方案');
    console.error(err);
  }
}

// ============================================================
// Export Mode 2: PptxGenJS text extraction (fallback, text-only)
// ============================================================
function extractTextBlocks(slideEl) {
  const blocks = [];
  function walk(el) {
    if (!el || !el.tagName) return;
    const tag = el.tagName.toUpperCase();
    if (['SCRIPT','STYLE','NOSCRIPT','SVG','IFRAME'].includes(tag)) return;
    const ownText = (el.childNodes.length === 1 && el.childNodes[0].nodeType === 3)
      ? (el.textContent || '').trim() : '';
    const hasChildElements = Array.from(el.children).length > 0;

    if (ownText && ownText.length > 0 && !hasChildElements) {
      blocks.push({ text: ownText.substring(0, 300), tag: tag });
      return;
    }
    Array.from(el.children).forEach(function(c) { walk(c); });
  }
  walk(slideEl);
  return blocks;
}

async function exportViaPptxGenJS() {
  if (slideEls.length === 0) { log('❌ 请先加载并渲染 HTML'); return; }

  try {
    clearLog();
    log('⏳ PptxGenJS 文本提取导出...');

    const pptx = new PptxGenJS();
    pptx.defineLayout({ name: 'C16x9', width: 10, height: 5.625 });
    pptx.layout = 'C16x9';

    slideEls.forEach(function(slideEl, idx) {
      const s = pptx.addSlide();
      const blocks = extractTextBlocks(slideEl);
      if (blocks.length === 0) {
        s.addText('[ 第 ' + (idx+1) + ' 页 — 无文本 ]', {
          x: 0.5, y: 2.5, w: 9, h: 0.6, fontSize: 14, color: '999999', align: 'center'
        });
        return;
      }
      let y = 0.35;
      blocks.forEach(function(b) {
        let fs = 12, bold = false;
        if (b.tag === 'H1') { fs = 30; bold = true; }
        else if (b.tag === 'H2') { fs = 22; bold = true; }
        else if (b.tag === 'H3') { fs = 17; bold = true; }
        else if (b.tag === 'H4') { fs = 14; bold = true; }
        const h = Math.max(0.28, fs * 0.02 * Math.ceil(b.text.length / 70) + 0.04);
        if (y + h > 5.2) return;
        s.addText(b.text, {
          x: 0.6, y: y, w: 8.8, h: h,
          fontSize: fs, bold: bold, color: b.tag.match(/^H\d$/) ? '1a1a2e' : '333333',
          fontFace: 'Microsoft YaHei', valign: 'top',
        });
        y += h + 0.03;
      });
      if (idx % 10 === 0) log('  [' + (idx+1) + '/' + slideEls.length + '] ' + blocks.length + ' blocks');
    });

    await pptx.writeFile({ fileName: 'converted-pptx.pptx' });
    log('✅ 导出成功！converted-pptx.pptx（纯文本模式，不含图形样式）');
  } catch (err) {
    log('❌ 导出失败: ' + err.message);
    console.error(err);
  }
}

// Auto-load on open
(function() {
  const path = document.getElementById('file-path').value.trim();
  if (path) { log('🚀 自动加载: ' + path); loadAndRender(); }
})();
</script>
</body>
</html>
